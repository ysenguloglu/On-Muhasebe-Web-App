services:
  - type: web
    name: on-muhasebe-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      # PDF API Key - html2pdf.app API key'inizi buraya ekleyin
      - key: PDF_API_KEY
        sync: false
      # Resend API (e-posta gönderimi) - https://resend.com
      - key: RESEND_API_KEY
        sync: false
      # E-posta adresleri
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_TO
        sync: false