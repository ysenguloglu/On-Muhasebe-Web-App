<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş - Ön Muhasebe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 380px;
        }
        h1 {
            color: #667eea;
            margin-bottom: 8px;
            font-size: 1.6em;
        }
        .subtitle { color: #666; margin-bottom: 24px; font-size: 14px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; color: #333; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover { background: #5568d3; }
        button:disabled { opacity: 0.7; cursor: not-allowed; }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Ön Muhasebe</h1>
        <p class="subtitle">Devam etmek için giriş yapın</p>
        <div id="errorMsg" class="error"></div>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Kullanıcı adı</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Şifre</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" id="submitBtn">Giriş yap</button>
        </form>
    </div>
    <script>
        const API_BASE = window.location.origin;
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const err = document.getElementById('errorMsg');
            err.style.display = 'none';
            err.textContent = '';
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) {
                err.textContent = 'Kullanıcı adı ve şifre girin.';
                err.style.display = 'block';
                return;
            }
            btn.disabled = true;
            try {
                const res = await fetch(API_BASE + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok && data.token) {
                    localStorage.setItem('token', data.token);
                    if (data.user) localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    err.textContent = data.detail || 'Giriş başarısız.';
                    err.style.display = 'block';
                }
            } catch (x) {
                err.textContent = 'Bağlantı hatası: ' + (x.message || 'Tekrar deneyin.');
                err.style.display = 'block';
            }
            btn.disabled = false;
        });
    </script>
</body>
</html>
